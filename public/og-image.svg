<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(59,130,246,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(168,85,247,0.05)"/>
  <!-- Logo M -->
  <text x="600" y="200" text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="120" font-weight="900" fill="url(#accent)">
    MetaLearning
  </text>
  <!-- Tagline -->
  <text x="600" y="290" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="36" fill="#94a3b8">
    AI-Powered Interactive 3D Education
  </text>
  <!-- Feature pills -->
  <rect x="250" y="360" width="200" height="50" rx="25" fill="rgba(59,130,246,0.2)"
        stroke="#3b82f6" stroke-width="1"/>
  <text x="350" y="393" text-anchor="middle" font-size="22" fill="#93c5fd">
    30+ 3D Models
  </text>
  <rect x="500" y="360" width="200" height="50" rx="25" fill="rgba(168,85,247,0.2)"
        stroke="#a855f7" stroke-width="1"/>
  <text x="600" y="393" text-anchor="middle" font-size="22" fill="#d8b4fe">
    PIN Sharing
  </text>
  <rect x="750" y="360" width="200" height="50" rx="25" fill="rgba(16,185,129,0.2)"
        stroke="#10b981" stroke-width="1"/>
  <text x="850" y="393" text-anchor="middle" font-size="22" fill="#6ee7b7">
    AI Generation
  </text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="28" fill="#475569">
    metalearning.app
  </text>
</svg>
